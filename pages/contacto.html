<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Academia Ficticia - Contacto</title>
    <link rel="stylesheet" href="../assets/css/menu.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css.map">
    <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.rtl.min.css.map">
</head>

<body>
    <!-- Menú -->
    <div id="menu-container"></div>

    <!-- titulo -->
    <div class="container mt-5">
        <h1 class="text-center">Contáctanos</h1>
    </div>

    <hr>

    <div class="container my-5 text-center">
        <h3>Redes sociales</h3>
        <div class="btn-group">
            <a href="https://www.whatsapp.com/?lang=es" target="_blank" class="btn btn-success">Whatsapp</a>
            <a href="https://www.facebook.com/?locale=es_LA" target="_blank" class="btn btn-primary">Facebook</a>
            <a href="mailto:prueba@gmail.com" class="btn btn-secondary">Correo</a>
        </div>
    </div>

    <hr>

    <div class="container my-5 bg-dark p-5">
        <h3 class="text-center text-white">Escribenos para ayudarte!!</h3>
        <form>
            <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label text-white">Ingresar dirección electronica</label>
                <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
            </div>
            <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label text-white">Ingresar mensaje</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
            </div>
            <div class="mb-3 d-grid gap-2 col-6 mx-auto">
                <button class="btn btn-info">Enviar</button>
            </div>
        </form>
    </div>


    <!-- Footer -->
    <div id="footer-container"></div>

    <script src="../assets/js/menu.js"></script>
    <script src="../assets/js/footer.js"></script>
    <script src="../assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/bootstrap/js/bootstrap.bundle.min.js.map"></script>
</body>

</html>
